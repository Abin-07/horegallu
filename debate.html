<!DOCTYPE html>
<html lang="en">
<head>

<title>Debate Arena — Horegallu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#chat{
width:90%;
max-width:400px;
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,150,0.2);
}

h2{
text-align:center;
color:#00ff99;
margin-top:0;
}

#topic{
background:#222;
padding:10px;
border-radius:6px;
text-align:center;
margin-bottom:10px;
color:#ffd54f;
}

#messages{
height:260px;
overflow-y:auto;
background:#000;
border:1px solid #333;
padding:8px;
margin-bottom:10px;
}

input{
width:70%;
padding:8px;
border:none;
border-radius:5px;
font-size:16px;
}

button{
width:25%;
padding:8px;
border:none;
background:#00ff99;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="chat">

<h2>🔥 Debate Arena</h2>

<div id="topic">Waiting for another debater...</div>

<div id="messages"></div>

<input id="msg" placeholder="Type argument...">
<button onclick="send()">Send</button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const topic = document.getElementById("topic");
const messages = document.getElementById("messages");
const input = document.getElementById("msg");

/* JOIN DEBATE MODE */
socket.emit("join-debate");

/* RECEIVE TOPIC */
socket.on("debate-topic",(t)=>{
topic.innerText="Topic: "+t;
});

/* RECEIVE MESSAGE */
socket.on("message",(msg)=>{
add("Opponent: "+msg);
});

/* SEND MESSAGE */
function send(){

const text=input.value;

if(text.trim()){

socket.emit("message",text);

add("You: "+text);

input.value="";
}

}

/* ADD MESSAGE TO CHAT */

function add(text){

const div=document.createElement("div");

div.innerText=text;

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>
</html>
