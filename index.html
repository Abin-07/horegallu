<!DOCTYPE html>
<html lang="en">
<head>
  <title>Horegallu — by Abinzz</title>

  <!-- ❌ ZOOM DISABLED (IMPORTANT) -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    /* ✅ EXTRA SAFETY AGAINST ZOOM */
    html, body {
      touch-action: manipulation;
      overscroll-behavior: contain;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #chat {
      width: 90%;
      max-width: 380px;
      background: #111;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,255,150,.3);
    }

    h2 {
      text-align: center;
      margin: 5px 0;
      color: #00ff99;
    }

    #brand {
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    #status, #count, #typing {
      font-size: 12px;
      margin: 5px 0;
      color: #aaa;
    }

    #messages {
      height: 40vh;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 6px;
      margin-bottom: 10px;
      background: #000;
    }

    input {
      width: 70%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 16px; /* prevents iOS zoom */
    }

    button {
      width: 25%;
      padding: 8px;
      background: #00ff99;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    #next {
      margin-top: 6px;
      width: 100%;
      background: #ff5555;
    }

    #report {
      margin-top: 6px;
      width: 100%;
      background: #ff9800;
    }
  </style>
</head>

<body>
<div id="chat">
  <h2>Horegallu</h2>
  <div id="brand">by Abinzz</div>

  <div id="count">Online: 0</div>
  <div id="status">Connecting...</div>
  <div id="typing"></div>

  <div id="messages"></div>

  <input id="msg" placeholder="Type message..." oninput="typing()" />
  <button onclick="send()">Send</button>

  <button id="next" onclick="next()">Next</button>
  <button id="report" onclick="reportUser()">Report</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  const messages = document.getElementById("messages");
  const status = document.getElementById("status");
  const typingText = document.getElementById("typing");
  const count = document.getElementById("count");
  const msg = document.getElementById("msg");

  socket.on("user-count", n => {
    count.innerText = "Online: " + n;
  });

  socket.on("waiting", () => {
    status.innerText = "Waiting for a stranger...";
  });

  socket.on("matched", () => {
    status.innerText = "Connected to a stranger!";
  });

  socket.on("partner-left", () => {
    status.innerText = "Stranger left. Click Next.";
  });

  socket.on("message", text => {
    add("Stranger: " + text);
  });

  socket.on("typing", () => {
    typingText.innerText = "Stranger is typing...";
    setTimeout(() => typingText.innerText = "", 1000);
  });

  socket.on("banned", data => {
    document.body.innerHTML =
      "<h2 style='color:white;text-align:center;padding:20px'>" +
      "🚫 You are banned until:<br>" + data.until +
      "</h2>";
  });

  function send() {
    const text = msg.value;
    if (text.trim()) {
      socket.emit("message", text);
      add("You: " + text);
      msg.value = "";
    }
  }

  function typing() {
    socket.emit("typing");
  }

  function next() {
    messages.innerHTML = "";
    socket.emit("next");
  }

  function reportUser() {
    if (confirm("Report this user for abuse?")) {
      socket.emit("report");
      alert("User reported successfully.");
    }
  }

  function add(text) {
    const d = document.createElement("div");
    d.innerText = text;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
</script>
</body>
</html>
