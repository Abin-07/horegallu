    /* 🔻 AD CONTAINER */

      background: #000;

      z-index: 999;
    }
        #menu{
      display:flex;
      gap:10px;

      {
        flex:1;

    #chat{
position:relative;
width:90%;
max-width:380px;
background:#111;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,150,.3);

<body>
<div id="chat">

  <!-- Debate Button Top Right -->
  <a href="/debate.html" id="debateBtn">🔥 Debate</a>

  <h2>Horegallu</h2>
  <div id="brand">by Abinzz</div>

  <div id="count">Online: 0</div>
  <div id="status">Connecting...</div>
  <div id="typing"></div>

  <div id="messages"></div>

  <input id="msg" placeholder="Type message..." oninput="typing()" />
  <button onclick="send()">Send</button>

  <button id="next" onclick="next()">Next</button>

  <button id="report" onclick="reportUser()">Report</button>

</div>

<!-- 🔻 AD AT BOTTOM -->
<div id="ad-container">
  <script>
    atOptions = {
      'key' : 'e161f1073ee4645266e598d96688e204',
      'format' : 'iframe',
      'height' : 50,
      'width' : 320,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/e161f1073ee4645266e598d96688e204/invoke.js"></script>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  const messages = document.getElementById("messages");
  const status = document.getElementById("status");
  const typingText = document.getElementById("typing");
  const count = document.getElementById("count");
  const msg = document.getElementById("msg");

  socket.on("user-count", n => count.innerText = "Online: " + n);
  socket.on("waiting", () => status.innerText = "Waiting for a stranger...");
  socket.on("matched", () => status.innerText = "Connected to a stranger!");
  socket.on("partner-left", () => status.innerText = "Stranger left. Click Next.");

  socket.on("message", text => add("Stranger: " + text));

  socket.on("typing", () => {
    typingText.innerText = "Stranger is typing...";
    setTimeout(() => typingText.innerText = "", 1000);
  });

  socket.on("banned", data => {
    document.body.innerHTML =
      "<h2 style='color:white;text-align:center;padding:20px'>" +
      "🚫 You are banned until:<br>" + data.until +
      "</h2>";
  });

  function send() {
    const text = msg.value;
    if (text.trim()) {
      socket.emit("message", text);
      add("You: " + text);
      msg.value = "";
    }
  }

  function typing() {
    socket.emit("typing");
  }

  function next() {
    messages.innerHTML = "";
    socket.emit("next");
  }

  function reportUser() {
    if (confirm("Report this user for abuse?")) {
      socket.emit("report");
      alert("User reported successfully.");
    }
  }

  function add(text) {
    const d = document.createElement("div");
    d.innerText = text;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
</script>
</body>
</html>
